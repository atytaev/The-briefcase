{% extends 'base.html' %}
{% load static %}
{% block content %}

<link rel="stylesheet" href="{% static 'styles/create_resume.css' %}">
<div class="full-page-form">
    <div class="resume-form-wrapper">
        <h1>Редактировать резюме</h1>
        <form method="post" class="resume-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-submit">Сохранить изменения</button>
        </form>
    </div>
</div>
{% endblock %}
