{% load static %}
{% csrf_token %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная - Кинотеатр</title>
    <link rel="stylesheet" href="{% static 'styles/main.css' %}">
</head>
<body>
    <header class="header">
        <div class="container">
        <div class="header-content">
            <!-- Название компании слева -->
            <div class="company-name">
                <a href="{% url 'film_list' %}" class="logo">
                    Moonlight
                </a>
            </div>
            <div class="header-actions">
                {% if user.is_authenticated %}
                    <a href="{% url 'user_ticket' %}" class="btn btn-outline">Мои билеты</a>
                    <a href="{% url 'user_logout' %}" class="btn btn-outline">Выйти</a>
                {% else %}
                    <a href="{% url 'user_login' %}" class="btn btn-outline">Войти</a>
                    <a href="{% url 'register' %}" class="btn btn-outline">Зарегистрироваться</a>
                {% endif %}
            </div>
        </div>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>


</body>
</html>
