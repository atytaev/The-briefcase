{% extends "base.html" %}

{% block content %}
<div class="container">
    <h2>Оплата билета</h2>
    <p>Стоимость: {{ amount }} USD</p>
    <div id="paypal-button-container"></div>
</div>

<script src="https://www.paypal.com/sdk/js?client-id={{ PAYPAL_CLIENT_ID }}&currency=USD"></script>
<script>
    paypal.Buttons({
        createOrder: function (data, actions) {
            return actions.order.create({
                purchase_units: [{
                    amount: {
                        value: '{{ amount }}' // Сумма платежа передается из Django
                    }
                }]
            });
        },
        onApprove: function (data, actions) {
            return actions.order.capture().then(function (details) {
                alert('Оплата завершена! Спасибо, ' + details.payer.name.given_name);
                window.location.href = "{% url 'payment_success' %}?orderID=" + data.orderID;
            });
        },
        onError: function (err) {
            alert('Произошла ошибка: ' + err);
            window.location.href = "{% url 'payment_failed' %}";
        }
    }).render('#paypal-button-container');
</script>
{% endblock %}
